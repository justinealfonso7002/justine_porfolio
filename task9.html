<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>span</title>
<style>
  #g-container{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 100px 100px 20px;
    border: 1px solid rgb(0, 255, 4);
    border-radius: 20px;
    gap: 5px; 
    color: rgb(0, 0, 0)
    
  }
  #g-container>.s1{
    background-color:rgb(4, 0, 255);
  }
 
  #g-item1{
    grid-row: span 2;
  }
  #g-item2{
   grid-column: span 1;
  }
  #g-item3{
    grid-column: span 1;
  }
    #g-item4{
    grid-column: span 2;
    }
      #g-item5{
    grid-column: span 3;
      }
</style>
</head>

<body>
  <div>
   <div id="g-container">
  <div id="g-item1" class="s1">1</div>
  <div id="g-item2" class="s1">2</div>
  <div id="g-item3" class="s1">3</div>
  <div id="g-item4" class="s1">4</div>
  <div id="g-item5" class="s1">5</div>
