<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positions Task</title>
    <style>

        body {
            height: 3000px;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #000;
            color: #1100ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .fixed-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 180px;
            background-color: #00d5ff;
        }

        .product-container {
            margin: 100px 20px;
        }

        .product-card {
            position: relative;
            display: inline-block;
            margin-right: 20px;
            border: 1px solid #000000;
            padding: 10px;
        }

        .product-img {
            width: 200px;
            height: auto;
        }

        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #000;
            color: #4000ff;
            padding: 5px 10px;
            font-size: 12px;
        }

        .add-to-cart {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 15px;
            background-color: #ffffff;
            border: 1px solid #2600ff;
            cursor: pointer;
        }
    </style>
</head>
<body>

  
    <div class="close-btn">×</div>

    <div class="fixed-box"></div>

    <div class="product-container">
        
        <div class="product-card">
            <img src="shoe.jpg" alt="Clothing" class="product-img">
            <div class="discount-badge">20% OFF</div>
        </div>

        <div class="product-card">
            <img src="shoe.jpg" alt="Clothing" class="product-img">
            <div class="discount-badge">20% OFF</div>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </div>

</body>
</html>
